[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# Serve robots.txt directly (critical for SEO)
[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200
force = true

# Serve sitemap.xml directly (critical for SEO)
[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200
force = true

# SEO-friendly URL redirects (301 = permanent) - standardize to kebab-case
[[redirects]]
from = "/CreateYours"
to = "/custom-passport-holder"
status = 301
force = true

[[redirects]]
from = "/CreateYours/"
to = "/custom-passport-holder"
status = 301
force = true

